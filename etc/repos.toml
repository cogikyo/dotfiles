# Repos manifest — cloned by ./install.sh repos
# Format: [name] with repo (GitHub org/name) and path (relative to ~/)

[dotfiles]
repo = "cogikyo/dotfiles"
path = "~/dotfiles"

[harpoon]
repo = "cogikyo/harpoon"
path = "~/cogikyo/harpoon"

[vagari]
repo = "cogikyo/vagari"
path = "~/vagari/vagari"

[vagari.nvim]
repo = "cogikyo/vagari.nvim"
path = "~/vagari/nvim"

[vagari.firefox]
repo = "cogikyo/vagari.firefox"
path = "~/vagari/firefox"

[cullyn.dev]
repo = "cogikyo/cullyn.dev"
path = "~/cogikyo/cullyn.dev"

[hgmx-builder]
repo = "cogikyo/hgmx-builder"
path = "~/cogikyo/hgmx-builder"

[hgmx]
repo = "cogikyo/hgmx"
path = "~/cogikyo/hgmx"

[kaizen]
repo = "cogikyo/kaizen"
path = "~/cogikyo/kaizen"
