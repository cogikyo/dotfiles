// Disable Ctrl+U (View Source) shortcut
try {
  Services.obs.addObserver(
    {
      observe(win) {
        win.addEventListener(
          "DOMContentLoaded",
          () => {
            let key = win.document.getElementById("key_viewSource");
            if (key) key.remove();
          },
          { once: true }
        );
      },
    },
    "domwindowopened"
  );
} catch (e) {}
