# Hyprd runtime configuration.

# ╭───────────────────────────────────────────────────────────────────────────────╮
# │ window-management tuning                                                      │
# ╰───────────────────────────────────────────────────────────────────────────────╯
windows:
  split:
    xs: "0.3695"
    default: "0.4939"
    lg: "0.7699"
  monocle:
    width: 2882
    height: 1864
    offset_x: 0
    offset_y: 25

# ╭───────────────────────────────────────────────────────────────────────────────╮
# │ session catalog                                                               │
# ╰───────────────────────────────────────────────────────────────────────────────╯
sessions:
  # ├─ workspace 2 ──────────────────────────────────────────────────────────────┤
  2: # communication-focused sessions.
    slack:
      init: true
      command: slack
      browser: coms

    discord:
      command: discord
      monocle: true
      browser: coms

  # ├─ workspace 3 ──────────────────────────────────────────────────────────────┤
  3: # utility and creative apps; mostly single window
    tableplus:
      command: tableplus
    inkscape:
      command: inkscape
    obs:
      command: obs

    harpoon:
      project: cogikyo/harpoon
      body:
        - editor
        - agents

    vagari.nvim:
      project: vagari/nvim
      body:
        - editor
        - agents

    vagari.firefox:
      project: vagari/firefox
      body:
        - editor
        - agents

  # ├─ workspace 4 ──────────────────────────────────────────────────────────────┤
  4: # primary project workspaces
    cogikyo:
      project: cogikyo/cogikyo.com
      body:
        - editor
        - browser
        - agents

    leadpier:
      init: true
      project: LeadPier
      body:
        - editor
        - browser
        - agents
      layout:
        master: editor
        slave: browser
        shadow: agents
      browser: leadpier
      tabs:
        editor: leadpier

  # ├─ workspace 5 ──────────────────────────────────────────────────────────────┤
  5: # personal infrastructure and dotfiles work.
    dotfiles:
      init: true
      project: dotfiles
      body:
        - editor
        - agents


# ╭───────────────────────────────────────────────────────────────────────────────╮
# │ kitty tab profiles                                                            │
# ╰───────────────────────────────────────────────────────────────────────────────╯
tabs:
  editor: # ├─ editor profile ────────────────────────────────────────────────────┤
    order: 0
    prefix: "ed-"
    focus: nvim
    tabs:
      - { name: xplr,  title: "⟜ 󰭎  ⊸", command: xplr }
      - { name: nvim,  title: "⟜   ⊸", command: nvim }
      - { name: term,  title: "⟜   ⊸", command: "etree 1" }
      - { name: build, title: "⟜   ⊸", command: "just watch", requires: justfile }
      - { name: git,   title: "⟜   ⊸", command: lazygit,      requires: git }

  agents: # ├─ agents profile ─────────────────────────────────────────────────────┤
    order: 1
    prefix: "agents-"
    focus: master
    tabs:
      - { name: xplr,   title: "⊰   ⊱", command: "opencode attach http://127.0.0.1:4096 --dir \"$PWD\"" }
      - { name: master, title: "⊰ 󰯉  ⊱", command: "opencode attach http://127.0.0.1:4096 --dir \"$PWD\"" }
      - { name: dev,    title: "⊰   ⊱", command: "opencode attach http://127.0.0.1:4096 --dir \"$PWD\"" }
      - { name: plan,   title: "⊰   ⊱", command: "opencode attach http://127.0.0.1:4096 --dir \"$PWD\"" }
      - { name: git,    title: "⊰   ⊱", command: "opencode attach http://127.0.0.1:4096 --dir \"$PWD\"" }

  leadpier: # ├─ leadpier profile ─────────────────────────────────────────────────┤
    order: 2
    prefix: "lp-"
    focus: fe-nvim
    tabs:
      - name: fe-nvim
        title: "«   »"
        command: nvim
        cwd: "~/LeadPier/frontend"
        actions:
          nvim: {}
      - name: be-nvim
        title: "«   »"
        command: nvim
        cwd: "~/LeadPier/backend/services"
        actions:
          nvim: {}
      - name: pier
        title: "« 󰠳  »"
        command: nvim
        cwd: "~/LeadPier"
        actions:
          nvim:
            pane: 0
          term:
            pane: 1
        layout: "fat:bias=50"
        panes:
          - cwd: "~/LeadPier/pier"
      - name: fe-build
        title: "«   »"
        command: lazygit
        cwd: "~/LeadPier/frontend"
        actions:
          git: {}
        layout: "fat:bias=80"
        panes:
          - command: ""
            cwd: "~/LeadPier/frontend"
      - name: be-build
        title: "«   »"
        command: "cd $(grep -m1 backend/services ~/.local/state/lazygit/state.yml | awk '{print $NF}') && lazygit"
        cwd: "~/LeadPier/backend"
        actions:
          git: {}
        layout: "fat:bias=80"
        panes:
          - command: ""
            cwd: "~/LeadPier/backend/core/runner"

# ╭───────────────────────────────────────────────────────────────────────────────╮
# │ background                                                                    │
# ╰───────────────────────────────────────────────────────────────────────────────╯
background:
  display: "auto"
  video_path: "~/dotfiles/share/videos"
  socket: "/tmp/mpvpaper.sock"
  wallpaper:
    file: "dna.mp4"
    brightness: 6
    contrast: 9
    saturation: -16
    hue: -24

# ╭───────────────────────────────────────────────────────────────────────────────╮
# │ init                                                                          │
# ╰───────────────────────────────────────────────────────────────────────────────╯
init:
  workspace: 1
  lock: true
  network_timeout: 10

# ╭───────────────────────────────────────────────────────────────────────────────╮
# │ bluetooth                                                                     │
# ╰───────────────────────────────────────────────────────────────────────────────╯
bluetooth:
  enabled: true
  device: "14:3F:A6:10:A1:B5"

# ╭───────────────────────────────────────────────────────────────────────────────╮
# │ vpn                                                                           │
# ╰───────────────────────────────────────────────────────────────────────────────╯
vpn:
  connections:
    Trend:
      profile: ~/.local/share/dotfiles/vpn/work.nmconnection

# ╭───────────────────────────────────────────────────────────────────────────────╮
# │ notifications                                                                 │
# ╰───────────────────────────────────────────────────────────────────────────────╯
notify:
  default_volume: 100 # percentage; 100 = paplay 65536. Per-event volume overrides this.

  # ├─ visual styles ────────────────────────────────────────────────────────────┤
  styles:
    primary:
      background: "#49353130"
      foreground: "#f2a170"
      frame: "#ea834b"
    secondary:
      background: "#25284180"
      foreground: "#8aa4f3"
      frame: "#6380ec80"
    tertiary:
      background: "#2a2d4580"
      foreground: "#b29ae8"
      frame: "#9376d880"
    success:
      background: "#2a3d2580"
      foreground: "#95cb79"
      frame: "#73ad5a80"
    error:
      background: "#49313130"
      foreground: "#f34658"
      frame: "#ea4b53"

  # ├─ agent events ─────────────────────────────────────────────────────────────┤
  # Persistent = timeout 0. Urgency derived: low if timeout > 0, normal otherwise.
  agent_events:
    start:
      style: secondary
      sound: civ5-worker-select
      volume: 105
      timeout: 1500
    idle:
      style: secondary
      sound: sdv-frog
      volume: 95
      timeout: 20000

    subagent:
      style: success
      sound: sdv-collect-item
      volume: 75
      timeout: 2500
    todo-complete:
      style: success
      sound: civ6-notification
      volume: 85
      timeout: 2500

    complete:
      style: primary
      sound: jobs-done
      volume: 110

    permission:
      style: tertiary
      sound: ssb-ready
    question:
      style: tertiary
      sound: hey-listen

    error:
      style: error
      sound: something-need-doing
      timeout: 2500
      volume: 100

  # ├─ sound routing ────────────────────────────────────────────────────────────┤
  urgency_sounds: # common urgency levels
    low: none
    normal: moondrop
    critical: gems

  app_sounds: # app-specific sounds override urgency-based sounds when both match.
    timer: jackpot
    attention: discovery
    chat: reward
    work: fruit
    wf-start: discovery
    wf-end: reward
    Slack: knock

  # ├─ silence filters ──────────────────────────────────────────────────────────┤
  silent_apps: # these suppress sounds without suppressing the notification itself.
    - Spotify
    - discord
  kitty_silent_patterns: # these silence agent based notications, favoring agent styles instead
    - claude
    - opencode
    - approval
