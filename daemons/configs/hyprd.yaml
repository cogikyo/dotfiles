monitor:
  width: 3840
  height: 2160
  reserved:
    top: 86
    bottom: 32
    left: 0
background:
  display: "HDMI-A-1"
  video_path: "~/dotfiles/share/videos"
  socket: "/tmp/mpvpaper.sock"
  wallpaper:
    file: "dna.mp4"
    brightness: 6
    contrast: 9
    saturation: -16
    hue: -24
init:
  execs:
    - "glava -e bars_rc.glsl"
    - "glava -e bars_r_rc.glsl"
    - "glava -e radial_rc.glsl"
    - "spotify-launcher"
    - "bluetoothctl connect 14:3F:A6:10:A1:B5"
  workspace: 1
  lock: true
  lock_delay: 3s
  network_timeout: 10
split:
  xs: "0.3695"
  default: "0.4939"
  lg: "0.7699"
style:
  border:
    default: "rgb(f2a170)"
  shadow:
    default: "rgba(e56b2c32)"
notify:
  sounds_dir: "~/dotfiles/share/sounds"
  workspace_icons_dir: "~/dotfiles/config/eww/art/ws-icons"
  workspace_icons:
    1: network
    2: learn
    3: dna
    4: dotfiles
    5: music
  quiet_volume: 52428
  loud_volume: 72089
  styles:
    start:
      urgency: low
      timeout: 2000
      background: "#25284180"
      foreground: "#8aa4f3"
      frame: "#6380ec80"
    subagent:
      urgency: low
      timeout: 2000
      background: "#25284180"
      foreground: "#8aa4f3"
      frame: "#6380ec80"
    complete:
      urgency: normal
      timeout: 0
      background: "#49353130"
      foreground: "#f2a170"
      frame: "#ea834b"
      icon_suffix: "-active"
      persistent: true
    idle:
      urgency: normal
      timeout: 0
      background: "#2a2d4580"
      foreground: "#b29ae8"
      frame: "#9376d880"
      icon_suffix: "-idle"
      persistent: true
    permission:
      urgency: normal
      timeout: 0
      background: "#2a3d2580"
      foreground: "#95cb79"
      frame: "#73ad5a80"
      icon_suffix: "-monocle"
      persistent: true
  urgency_sounds:
    low: none
    normal: moondrop
    critical: gems
  app_sounds:
    timer: jackpot
    attention: discovery
    chat: reward
    work: fruit
    wf-start: discovery
    wf-end: reward
    Slack: knock
  silent_apps:
    - Spotify
    - discord
    - claude
    - codex
    - claude-input
    - 
    - 󰯉
    - 
    - 
    - 
  kitty_silent_patterns:
    - claude
    - codex
    - approval
windows:
  ignored_classes:
    - "GLava"
  hidden_workspace: "special:hiddenSlaves"
  shadow_workspace: "special:shadow"
  monocle:
    width: 2882
    height: 1864
    offset_x: 0
    offset_y: 25
tabs:
  editor:
    prefix: "ed-"
    focus: nvim
    tabs:
      - { name: xplr, title: "⟜ 󰭎  ⊸", command: xplr }
      - { name: nvim, title: "⟜   ⊸", command: nvim }
      - { name: term, title: "⟜   ⊸" }
      - { name: build, title: "⟜   ⊸", command: "just watch", requires: justfile }
      - { name: git, title: "⟜   ⊸", command: lazygit, requires: git }

  agents:
    prefix: "agents-"
    focus: master
    tabs:
      - { name: xplr, title: "⊰   ⊱", command: "codex -c model=\"gpt-5.4\" -c model_reasoning_effort=\"xhigh\"" }
      - { name: master, title: "⊰ 󰯉  ⊱", command: "claude --effort high" }
      - { name: dev, title: "⊰   ⊱", command: "codex -c model=\"gpt-5.3-codex\" -c model_reasoning_effort=\"high\"" }
      - { name: plan, title: "⊰   ⊱", command: "claude --effort max" }
      - { name: git, title: "⊰   ⊱", command: "codex -c model=\"gpt-5.3-codex\" -c model_reasoning_effort=\"low\"" }

  leadpier:
    prefix: "lp-"
    focus: fe-nvim
    tabs:
      - { name: fe-nvim, title: "«   »", command: nvim, cwd: "~/LeadPier/frontend" }
      - { name: be-nvim, title: "«   »", command: nvim, cwd: "~/LeadPier/backend" }
      - { name: nvim,    title: "« 󰠳  »", command: nvim, cwd: "~/LeadPier" }
      - { name: fe-build, title: "«   »", command: "yarn dev", cwd: "~/LeadPier/frontend", layout: "fat:bias=80", panes: [{ cwd: "~/LeadPier/frontend" }] }
      - { name: be-build, title: "«   »", command: "pier watch", cwd: "~/LeadPier/backend/core/runner", layout: "fat:bias=80", panes: [{ cwd: "~/LeadPier/backend/core/runner" }] }

three_body:
  editor:
    class: kitty
    title: editor
    command: "kitty --title=editor --session ~/.config/kitty/sessions/editor.conf"
  agents:
    class: kitty
    title: agents
    command: "kitty --title=agents --session ~/.config/kitty/sessions/agents.conf"
  browser:
    class: firefox-developer-edition
    command: firefox-developer-edition

sessions:
  slack:
    name: slack
    workspace: 2
    command: slack
    monocle: true
  discord:
    name: discord
    workspace: 2
    command: discord
    monocle: true
  tableplus:
    name: tableplus
    workspace: 3
    command: tableplus
  inkscape:
    name: inkscape
    workspace: 3
    command: inkscape
  obs:
    name: obs
    workspace: 3
    command: obs
  gimp:
    name: gimp
    workspace: 3
    command: gimp

  leadpier:
    name: leadpier
    workspace: 4
    project: LeadPier
    body:
      - editor
      - browser
      - agents
    browser:
      snapshot: leadpier
      mode: exact
      force: true
    tabs:
      editor: leadpier

  dotfiles:
    name: dotfiles
    workspace: 5
    project: dotfiles
    body:
      - editor
      - browser
      - agents
    browser:
      urls:
        - https://github.com/cogikyo/dotfiles
  cogikyo:
    name: cogikyo
    workspace: 4
    project: cogikyo/cogikyo.com
    body:
      - editor
      - browser
      - agents
    browser:
      urls:
        - localhost:3000
active_sessions:
  2: { session: slack, init: true }
  3: { session: tableplus, init: true }
  4: { session: leadpier, init: true }
  5: { session: dotfiles, init: true }
