eww:
  weather:
    api_key_file: "~/.local/.owm_api_key"
    poll_interval: 60s
  timer:
    default_minutes: 90
    default_alarm_hours: 6
    min_alarm_hours: 3
  audio:
    source_offset: 50
    source_max: 150
    sink_max: 100
    volume_step: 10
    poll_interval: 2s
    default_sink_volume: 69
    default_source_volume: 150
    name_mappings:
      cullyn: "pixel buds"
  brightness:
    min: 2
    max: 10
    night: 4
    default: 10
  date:
    birth_date: "1996-02-26"
  gpu:
    device_path: "/sys/class/drm/card0/device"
    poll_interval: 500ms
  network:
    poll_interval: 1s

hypr:
  monitor:
    width: 3840
    height: 2160
    reserved:
      top: 86
      bottom: 32
      left: 0
  background:
    display: "HDMI-A-1"
    video_path: "~/dotfiles/share/videos"
    socket: "/tmp/mpvpaper.sock"
    wallpaper:
      file: "dna.mp4"
      brightness: 6
      contrast: 9
      saturation: -16
      hue: -24
  split:
    xs: "0.37"
    default: "0.4942"
    lg: "0.77"
  style:
    border:
      default: "rgb(f2a170)"
    shadow:
      default: "rgba(e56b2c32)"
  windows:
    ignored_classes:
      - "GLava"
    hidden_workspace: "special:hiddenSlaves"
  three_body:
    editor:
      class: kitty
      title: editor
      command: "kitty --title=editor --session ~/.config/kitty/sessions/editor.conf"
    agents:
      class: kitty
      title: agents
      command: "kitty --title=agents --session ~/.config/kitty/sessions/agents.conf"
      notify_or: true
    browser:
      class: firefox-developer-edition
      command: firefox-developer-edition
  sessions:
    dotfiles:
      name: dotfiles
      workspace: 5
      project: dotfiles
      urls:
        - "https://github.com/cogikyo/dotfiles"
      windows:
        - { command: "kitty --title terminal", title: terminal, role: master }
        - { title: firefox, role: slave }
        - { command: "kitty --title claude", title: claude, role: slave }
    cogikyo:
      name: cogikyo
      workspace: 4
      project: cogikyo/cogikyo.com
      urls:
        - "localhost:3000"
      windows:
        - { command: "kitty --title terminal", title: terminal, role: master }
        - { title: firefox, role: slave }
        - { command: "kitty --title claude", title: claude, role: slave }

newtab:
  port: ":42069"
  firefox_db: ".mozilla/firefox/sdfm8kqz.dev-edition-default/places.sqlite"
  static_dir: "dotfiles/daemons/newtab"
  history_limit: 15
