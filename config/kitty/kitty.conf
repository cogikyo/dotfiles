# ╭──────────────────────────────────────────────────────────────────────────────╮
# │ Font                                                                         │
# ╰──────────────────────────────────────────────────────────────────────────────╯

font_size        15
modify_font      cell_height -1px
font_family      Vagari
italic_font      Vagari Italic
bold_font        Vagari Bold
bold_italic_font Vagari Bold Italic

symbol_map       U+E000-U+F8FF  Symbols Nerd Font Mono

box_drawing_scale          0.00125, 1.25, 1.875, 2.5
default_pointer_shape      arrow
cursor_beam_thickness      1.875
cursor_underline_thickness 2.5

# ╭──────────────────────────────────────────────────────────────────────────────╮
# │ Tab Bar | see tab_bar.py                                                     │
# ╰──────────────────────────────────────────────────────────────────────────────╯

tab_bar_edge          top
tab_bar_style         custom
tab_bar_min_tabs      1
bell_on_tab           false
tab_separator         ""
active_tab_font_style normal

# ╭──────────────────────────────────────────────────────────────────────────────╮
# │ Layout                                                                       │
# ╰──────────────────────────────────────────────────────────────────────────────╯

enabled_layouts            fat:bias=50,tall:bias=50,fat:bias=80
window_border_width        2px
window_margin_width        5
single_window_margin_width 0
placement_strategy         center

# ╭──────────────────────────────────────────────────────────────────────────────╮
# │ Behavior                                                                     │
# ╰──────────────────────────────────────────────────────────────────────────────╯

scrollback_pager        nvimpager
paste_actions           quote-urls-at-prompt
strip_trailing_spaces   smart
confirm_os_window_close 3
listen_on               unix:/tmp/kitty
allow_remote_control    yes
notify_on_cmd_finish    unfocused 10.0 command /home/cullyn/.local/bin/hyprd notify kitty-finish "%c"
enable_audio_bell       no

# ╭──────────────────────────────────────────────────────────────────────────────╮
# │ Colors                                                                       │
# ╰──────────────────────────────────────────────────────────────────────────────╯

cursor               none
foreground           #aeb9f8
background           #222536
selection_foreground none
selection_background #30345a

active_tab_foreground   #f2a170
active_tab_background   #282b48
inactive_tab_foreground #7492ef
inactive_tab_background #222536
tab_bar_background      #1e2133
tab_bar_margin_color    #222536
url_color               #72b08e

active_border_color   #8aa4f3
inactive_border_color #282b48
inactive_text_alpha   0.80

mark1_foreground #222536
mark1_background #f5d599
mark2_foreground #222536
mark2_background #75e6d5
mark3_foreground #222536
mark3_background #ed9acd

color0  #282b48
color8  #484e75
color1  #f07a88
color9  #f36978
color2  #95cb79
color10 #5aba6d
color3  #f2a170
color11 #f5b855
color4  #8aa4f3
color12 #6380ec
color5  #a188df
color13 #e887c3
color6  #6bbdec
color14 #50dec8
color7  #aeb9f8
color15 #cad1fb

# ╭──────────────────────────────────────────────────────────────────────────────╮
# │ Keymaps                                                                      │
# ╰──────────────────────────────────────────────────────────────────────────────╯

kitty_mod           ctrl+shift
clear_all_shortcuts yes

map shift+enter      send_text current \e\r
map kitty_mod+equal  change_font_size current +1.0
map kitty_mod+minus  change_font_size current -1.0
map kitty_mod+\      change_font_size current 0
map kitty_mod+/      change_font_size current 19
map kitty_mod+z      load_config_file
map kitty_mod+i      kitten unicode_input

# ╭──────────────────────────────────────────────────────────────────────────────╮
# │ Clipboard                                                                    │
# ╰──────────────────────────────────────────────────────────────────────────────╯

map ctrl+c      copy_or_interrupt
map kitty_mod+v paste_from_clipboard
map kitty_mod+q launch --type=clipboard --stdin-source=@last_cmd_output

# ╭──────────────────────────────────────────────────────────────────────────────╮
# │ Scrolling                                                                    │
# ╰──────────────────────────────────────────────────────────────────────────────╯

scrollback_lines                10000
scrollback_fill_enlarged_window yes

map kitty_mod+up    scroll_line_up
map kitty_mod+down  scroll_line_down
map kitty_mod+u     scroll_page_up
map kitty_mod+d     scroll_page_down
map kitty_mod+home  scroll_home
map kitty_mod+end   scroll_end
map kitty_mod+right scroll_to_prompt 1
map kitty_mod+left  scroll_to_prompt -1
map kitty_mod+s>s   show_scrollback
map kitty_mod+s>c   show_last_command_output

# ╭──────────────────────────────────────────────────────────────────────────────╮
# │ Tabs                                                                         │
# ╰──────────────────────────────────────────────────────────────────────────────╯

map kitty_mod+right next_tab
map kitty_mod+left  previous_tab
map kitty_mod+a     goto_tab 1
map kitty_mod+s     goto_tab 2
map kitty_mod+e     goto_tab 3
map kitty_mod+t     goto_tab 4
map kitty_mod+g     goto_tab 5
map kitty_mod+w>t   move_tab_forward
map kitty_mod+w>e   move_tab_backward

action_alias new_tab_current launch --cwd=current --type=tab
map kitty_mod+w>kitty_mod+t  new_tab_current --tab-title="⟜   ⊸"
map kitty_mod+w>kitty_mod+c  new_tab_current --tab-title="⊰ 󰯉  ⊱"
map kitty_mod+w>kitty_mod+w  close_tab

action_alias hyprd_tabs launch --cwd=current --type=background zsh -ic
map kitty_mod+r>a          hyprd_tabs "hyprd tabs refresh xplr:scout"
map kitty_mod+r>s          hyprd_tabs "hyprd tabs refresh nvim:build:fe-nvim"
map kitty_mod+r>e          hyprd_tabs "hyprd tabs refresh term:drive:nvim"
map kitty_mod+r>t          hyprd_tabs "hyprd tabs refresh build:plan:fe-build"
map kitty_mod+r>g          hyprd_tabs "hyprd tabs refresh git:learn:be-build"
map kitty_mod+r>r          hyprd_tabs "hyprd tabs refresh all"

# ╭──────────────────────────────────────────────────────────────────────────────╮
# │ Windows                                                                      │
# ╰──────────────────────────────────────────────────────────────────────────────╯

map kitty_mod+return  new_window_with_cwd
map kitty_mod+x       close_window
map kitty_mod+n       next_window
map kitty_mod+y       previous_window
map kitty_mod+l       next_layout

# ╭──────────────────────────────────────────────────────────────────────────────╮
# │ Hints                                                                        │
# ╰──────────────────────────────────────────────────────────────────────────────╯

action_alias myhints  kitten hints --alphabet tneisoalfpruvwhd1234789 --hints-offset 0 # home-row priority
map kitty_mod+h>p  myhints --type path --program @
map kitty_mod+h>l  myhints --type line --program @
map kitty_mod+h>w  myhints --type word --program @ --minimum-match-length 4
map kitty_mod+h>h  myhints --type hash --program @
