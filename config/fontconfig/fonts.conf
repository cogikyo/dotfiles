<?xml version='1.0'?>
<!DOCTYPE fontconfig SYSTEM 'fonts.dtd'>
<fontconfig>
    <alias>
        <family>sans-serif</family>
        <prefer>
            <family>Albert Sans</family>
            <family>Symbols Nerd Font</family>
            <family>Noto Color Emoji</family>
        </prefer>
    </alias>
    <alias>
        <family>serif</family>
        <prefer>
            <family>Lora</family>
            <family>Symbols Nerd Font</family>
            <family>Noto Color Emoji</family>
        </prefer>
    </alias>
    <match target="pattern">
        <test name="family" compare="eq" qual="first">
            <string>monospace</string>
        </test>
        <edit name="family" mode="assign" binding="strong">
            <string>Vagari</string>
        </edit>
        <edit name="family" mode="append" binding="strong">
            <string>Symbols Nerd Font</string>
        </edit>
        <edit name="family" mode="append" binding="strong">
            <string>Noto Color Emoji</string>
        </edit>
    </match>
    <alias>
        <family>monospace</family>
        <prefer>
            <family>Vagari</family>
            <family>Symbols Nerd Font</family>
            <family>Noto Color Emoji</family>
        </prefer>
    </alias>
    <match target="scan">
        <test name="family" compare="eq">
            <string>Vagari</string>
        </test>
        <edit name="spacing" mode="assign">
            <int>100</int>
        </edit>
    </match>
    <alias>
        <family>display</family>
        <prefer>
            <family>Archivo</family>
            <family>Symbols Nerd Font</family>
            <family>Noto Color Emoji</family>
        </prefer>
    </alias>
    <alias>
        <family>handwritten</family>
        <prefer>
            <family>Architects Daughter</family>
            <family>Symbols Nerd Font</family>
            <family>Noto Color Emoji</family>
        </prefer>
    </alias>
</fontconfig>
