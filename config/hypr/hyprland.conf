source = ~/.config/hypr/palette.conf

# ╭───────────────────────────────────────────────────────────────────────────────╮
# │                                  environment                                  │
# ╰───────────────────────────────────────────────────────────────────────────────╯

env = HYPRCURSOR_THEME,catppuccin-macchiato-light-cursors
env = HYPRCURSOR_SIZE,26
env = XCURSOR_THEME,catppuccin-macchiato-light-cursors
env = XCURSOR_SIZE,26

env = XDG_CURRENT_DESKTOP,Hyprland
env = XDG_SESSION_TYPE,wayland
env = XDG_SESSION_DESKTOP,Hyprland

env = QT_QPA_PLATFORM,wayland;xcb
env = QT_QPA_PLATFORMTHEME,hyprqt6engine
env = QT_WAYLAND_DISABLE_WINDOWDECORATION,1
env = QT_SCALE_FACTOR,1.25
env = QT_STYLE_OVERRIDE,kvantum

env = GDK_BACKEND,wayland,x11
env = GDK_DPI_SCALE,1.25
env = SDL_VIDEODRIVER,wayland
env = PATH,$HOME/.local/bin:$PATH

# ╭───────────────────────────────────────────────────────────────────────────────╮
# │                                   autostart                                   │
# ╰───────────────────────────────────────────────────────────────────────────────╯

exec-once = sh -c 'taskset -cp 0-6,8-14,16-1023 "$PPID" >/dev/null'
exec-once = taskset -c 7,15 dunst
exec-once = hyprpolkitagent
exec-once = hypridle
exec-once = taskset -c 7,15 ewwd
exec-once = hyprd init       # imports env, starts daemons, runs boot sequence

# GTK theming via gsettings — Wayland reads dconf, not settings.ini.
$gnome = org.gnome.desktop.interface
exec-once = gsettings set $gnome gtk-theme 'catppuccin-macchiato-peach-standard+default'
exec-once = gsettings set $gnome color-scheme 'prefer-dark'
exec-once = gsettings set $gnome icon-theme 'Papirus-Dark'
exec-once = gsettings set $gnome font-name 'Albert Sans 12'
exec-once = gsettings set $gnome document-font-name 'Lora 12'
exec-once = gsettings set $gnome monospace-font-name 'Vagari 12'
exec-once = gsettings set $gnome cursor-theme 'catppuccin-macchiato-light-cursors'
exec-once = gsettings set $gnome cursor-size 26

# ╭───────────────────────────────────────────────────────────────────────────────╮
# │                                    monitor                                    │
# ╰───────────────────────────────────────────────────────────────────────────────╯

monitor = , preferred, auto, 1

# ╭───────────────────────────────────────────────────────────────────────────────╮
# │                                 window rules                                  │
# ╰───────────────────────────────────────────────────────────────────────────────╯

# Spotify — pinned to ws 1, translucent overlay on the right.
windowrule = match:class ^(Spotify)$, workspace 1 silent
windowrule = match:class ^(Spotify)$, float on
windowrule = match:class ^(Spotify)$, opacity 0.75 override 0.75 override
windowrule = match:class ^(Spotify)$, size 1710 2053
windowrule = match:class ^(Spotify)$, move 2018 88

windowrule = match:class discord, workspace 2 silent
windowrule = match:class slack, workspace 2 silent

windowrule = match:class ^(libreoffice-.+|org\.pwmt\.zathura)$, workspace 3 silent

# Chromium — used as a floating media player.
windowrule = match:class ^(Chromium-browser)$, float on
windowrule = match:class ^(Chromium-browser)$, opacity 0.75 override 0.75 override
windowrule = match:class ^(Chromium-browser)$, size 1280 720
windowrule = match:class ^(Chromium-browser)$, move 269 200

windowrule = match:class ^(org\.pwmt\.zathura)$, float on
windowrule = match:class ^(org\.pwmt\.zathura)$, size 1000 1475
windowrule = match:class ^(org\.pwmt\.zathura)$, center on

windowrule = match:class ^(imv|mpv)$, float on
windowrule = match:class ^(imv|mpv)$, center on
windowrule = match:title zoom, float on

windowrule = match:class ^(thunar)$, float on
windowrule = match:class ^(thunar)$, size 1400 1000
windowrule = match:class ^(thunar)$, center on

windowrule = match:title ^(firefox-developer-edition)$, opacity 1.0 override 1.0 override
windowrule = match:class ^(firefox-developer-edition)$ match:title ^(Extension:|Sign in), float on

# GLava — desktop audio visualizer, fully passthrough.
windowrule = match:title ^(GLava)$, border_size 0
windowrule = match:title ^(GLava)$, no_focus on
windowrule = match:title ^(GLava)$, no_shadow on
windowrule = match:title ^(GLava)$, float on
windowrule = match:title ^(GLava)$, pin on
windowrule = match:title ^(GLava)$, no_blur on

windowrule = match:title ^(File|Settings|Authentication|Save As|terminalfloat), float on
windowrule = match:title ^(File|Settings|Authentication|Save As|terminalfloat), dim_around on
windowrule = match:title ^(File|Settings|Authentication|Save As|terminalfloat), size 2900 1606
windowrule = match:title ^(File|Settings|Authentication|Save As|terminalfloat), move 17% 10%

windowrule = match:class ^(Xdg-desktop-portal-gtk)$, float on
windowrule = match:class ^(Xdg-desktop-portal-gtk)$, dim_around on
windowrule = match:class ^(Xdg-desktop-portal-gtk)$, border_size 0
windowrule = match:class ^(Xdg-desktop-portal-gtk)$, no_blur on
windowrule = match:class ^(Xdg-desktop-portal-gtk)$, no_shadow on
windowrule = match:class ^(Xdg-desktop-portal-gtk)$, size 2900 1606
windowrule = match:class ^(Xdg-desktop-portal-gtk)$, move 17% 10%

# Satty — screenshot annotation popup, float centered at monocle size.
windowrule = match:class ^(com\.gabm\.satty)$, float on
windowrule = match:class ^(com\.gabm\.satty)$, size 2882 1864
windowrule = match:class ^(com\.gabm\.satty)$, move 479 173

windowrule = match:title guvcview, float on
windowrule = match:title guvcview, rounding 69
windowrule = match:title guvcview, opacity 0.8
windowrule = match:title guvcview, no_focus on

workspace = special:stash, gapsout:120

source = ~/.config/hypr/binds.conf

# ╭───────────────────────────────────────────────────────────────────────────────╮
# │                                    layout                                     │
# ╰───────────────────────────────────────────────────────────────────────────────╯

general {
    border_size = 2
    gaps_in = 7
    gaps_out = 84, 85, 22, 125  # top, right, bottom, left — room for eww bar
    col.active_border = $peach
    col.inactive_border = $blue
    layout = master
    resize_on_border = false
}

decoration {
    rounding = 4
    active_opacity = 1
    inactive_opacity = 0.98
    fullscreen_opacity = 1

    shadow {
        enabled = true
        range = 24
        render_power = 4
        ignore_window = true
        color = $shadow_active
        color_inactive = $shadow_inactive
        offset = 0 0
    }
}

animations {
    enabled = true
    animation = windows, 1, 2, default, popin
    animation = windowsOut, 1, 2, default
    animation = windowsMove, 1, 1.5, default, slidefade
    animation = workspaces, 1, 3, default, slide
    animation = fade, 1, 1.5, default
}

input {
    repeat_rate = 69
    repeat_delay = 324
    follow_mouse = 1
    sensitivity = 1
    float_switch_override_focus = 0
}

master {
    allow_small_split = true
    special_scale_factor = 1
    mfact = 0.4939
    new_status = slave
    new_on_top = false
    new_on_active = none
    orientation = left
    smart_resizing = false
    drop_at_cursor = true
    always_keep_position = false
}

dwindle {
    pseudotile = false
    force_split = 0
    preserve_split = false
    smart_split = false
    smart_resizing = true
    permanent_direction_override = false
    special_scale_factor = 1
    split_width_multiplier = 1.0
    use_active_for_splits = true
    default_split_ratio = 1.0
    split_bias = 0
    precise_mouse_move = false
}
