# Idle escalation: pseudo-lock quickly, full lock after a pause, then suspend.
general {
    # Reuse an existing hyprlock instance when possible; otherwise fall back to hyprd.
    lock_cmd = pidof hyprlock || hyprd lock full
    # Lock before suspend so resume always returns to an authenticated session.
    before_sleep_cmd = loginctl lock-session
    # Re-enable the display after wake; hyprlock/pseudo-lock handles the visual gate.
    after_sleep_cmd = hyprctl dispatch dpms on
}

# Short idle after 2 minutes: hide content but allow a quick resume.
listener {
    timeout = 120
    on-timeout = hyprd lock
    on-resume = hyprd lock unlock
}

# Medium idle after 5 minutes: require full authentication.
listener {
    timeout = 300
    on-timeout = hyprd lock full
}

# Long idle after 10 minutes: hand off to system power management.
listener {
    timeout = 600
    on-timeout = systemctl suspend-then-hibernate
}
