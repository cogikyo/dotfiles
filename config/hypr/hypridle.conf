# Idle escalation: pseudo-lock -> full lock -> suspend-then-hibernate.
general {
    lock_cmd = pidof hyprlock || hyprd lock full
    before_sleep_cmd = loginctl lock-session
    after_sleep_cmd = hyprctl dispatch dpms on
}

listener {
    timeout = 180   # 3 min — pseudo-lock (content hidden, quick resume)
    on-timeout = hyprd lock
    on-resume = hyprd lock unlock
}

listener {
    timeout = 600   # 10 min — full lock (hyprlock authentication)
    on-timeout = hyprd lock full
}

listener {
    timeout = 1800  # 30 min — suspend (hibernates after HibernateDelaySec)
    on-timeout = systemctl suspend-then-hibernate
}
