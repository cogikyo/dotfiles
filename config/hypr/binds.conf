# ╭───────────────────────────────────────────────────────────────────────────────╮
# │ hyprd focus control                                                           │
# ╰───────────────────────────────────────────────────────────────────────────────╯
# bindd = ALT, A, Focus tree, exec, hyprd tab nvimtree
# bindd = ALT, S, Focus nvim, exec, hyprd tab nvim
# bindd = ALT, E, Terminal,   exec, hyprd tab term
# bindd = ALT, T, Build,      exec, hyprd tab build
# bindd = ALT, G, Focus git,  exec, hyprd tab git

bindd = ALT CTRL, A, Focus scout, exec, hyprd tab agents:scout
bindd = ALT CTRL, S, Focus build, exec, hyprd tab agents:build
bindd = ALT CTRL, E, Focus drive, exec, hyprd tab agents:drive
bindd = ALT CTRL, T, Focus plan,  exec, hyprd tab agents:plan
bindd = ALT CTRL, G, Focus learn, exec, hyprd tab agents:learn

bindd = ALT, R, Editor,     exec, hyprd three-body editor
bindd = ALT, D, Browser,    exec, hyprd three-body browser
bindd = ALT, C, Agents,     exec, hyprd three-body agents
bindd = ALT, X, Dismiss,    exec, dunstctl close

bindd = ALT,         Backspace, Toggle shadow,      exec, hyprd three-body shadow
bindd = CTRL SHIFT,  Escape,    Toggle shadow,      exec, hyprd three-body shadow
bindd = ALT,         Z,         Swap with master,   exec, hyprd swap
bindd = SUPER,       Z,         Swap with master,   exec, hyprd swap
bindd = SUPER SHIFT, A,         Swap with master,   exec, hyprd swap
bindd = SUPER,       A,         Toggle monocle,     exec, hyprd monocle
bindd = ALT SHIFT,   Z,         Cycle master split, exec, hyprd split
bindd = SUPER SHIFT, Z,         Cycle master split, exec, hyprd split

# ╭───────────────────────────────────────────────────────────────────────────────╮
# │ window management                                                             │
# ╰───────────────────────────────────────────────────────────────────────────────╯
bindd = SUPER, X,   Close active window, killactive
bindd = SUPER, K,   Force kill window,   exec, hyprctl kill
bindd = SUPER, F,   Toggle floating,     exec, sh -c 'hyprctl activewindow | grep -q "floating: 1" && hyprctl dispatch togglefloating || hyprctl --batch "dispatch togglefloating; dispatch resizeactive exact $float_size; dispatch centerwindow"'
bindd = SUPER, V,   Screen share mode,   exec, hyprd share
bindd = SUPER, F11, Toggle full screen,  exec, hyprctl dispatch fullscreen 0

bindm = SUPER, mouse:273, movewindow
bindm = SUPER, mouse:275, resizewindow

# ├┤ move to workspace ├──────────────────────────────────────────────────────────┤
bindd = SUPER, g, Workspace 1 (music),    exec, hyprd ws 1
bindd = SUPER, s, Workspace 2 (chat),     exec, hyprd ws 2
bindd = SUPER, e, Workspace 3 (misc),     exec, hyprd ws 3
bindd = SUPER, t, Workspace 4 (primary),  exec, hyprd ws 4
bindd = SUPER, d, Workspace 5 (settings), exec, hyprd ws 5

# ├┤ move window focus ├──────────────────────────────────────────────────────────┤
bindd = ALT, S, Focus left,  movefocus, l
bindd = ALT, T, Focus right, movefocus, r
bindd = ALT, R, Focus up,    movefocus, u
bindd = ALT, E, Focus down,  movefocus, d

# ├┤ move windows ├───────────────────────────────────────────────────────────────┤
bindd = SUPER, Left,  Move window left,    movewindow, l
bindd = SUPER, Right, Move window right,   movewindow, r
bindd = SUPER, Up,    Move window up,      movewindow, u
bindd = SUPER, Down,  Move window down,    movewindow, d
bindd = SUPER, Home,  Move workspace down, exec,       hyprd ws down
bindd = SUPER, End,   Move workspace up,   exec,       hyprd ws up

# ╭───────────────────────────────────────────────────────────────────────────────╮
# │ launchers                                                                     │
# ╰───────────────────────────────────────────────────────────────────────────────╯
bindd = SUPER, N,  Apps,          exec, hyprlauncher
bindd = SUPER, I,  Layout picker, exec, hyprd picker open
submap = picker
bindd  = , Left,     Picker layout previous, exec, hyprd picker left
bindd  = , H,        Picker layout previous, exec, hyprd picker left
bindd  = , Right,    Picker layout next,     exec, hyprd picker right
bindd  = , L,        Picker layout next,     exec, hyprd picker right
bindd  = , Up,       Picker workspace up,    exec, hyprd picker up
bindd  = , K,        Picker workspace up,    exec, hyprd picker up
bindd  = , Down,     Picker workspace down,  exec, hyprd picker down
bindd  = , J,        Picker workspace down,  exec, hyprd picker down
bindd  = , Return,   Picker confirm,         exec, hyprd picker confirm
bindd  = , Escape,   Picker close,           exec, hyprd picker close
bind   = , catchall, exec,
submap = reset

# ╭───────────────────────────────────────────────────────────────────────────────╮
# │                                     media                                     │
# ╰───────────────────────────────────────────────────────────────────────────────╯
$player = playerctl --player=spotify
$audio = wpctl
$display = ddcutil --bus 8 --noverify
$terminal = kitty --title terminalfloat -e

bindl = SUPER SHIFT,       H,         exec, $player play-pause
bindl = SUPER SHIFT,       Period,         exec, $player previous
bindl = SUPER SHIFT,       Comma,         exec, $player next

bindl =,       XF86AudioPlay,         exec, $player play-pause
bindl =,       XF86AudioPause,        exec, $player play-pause
bindl =,       XF86AudioStop,         exec, $player stop
bindl =,       XF86AudioNext,         exec, $player next
bindl =,       XF86AudioPrev,         exec, $player previous
bindl =,       XF86AudioMute,         exec, $audio set-mute @DEFAULT_AUDIO_SINK@ toggle
bindl = SUPER, XF86AudioMute,         exec, $audio set-mute @DEFAULT_AUDIO_SOURCE@ toggle
bindl =,       XF86AudioRaiseVolume,  exec, $audio set-volume -l 1.5 @DEFAULT_AUDIO_SINK@ 5%+
bindl =,       XF86AudioLowerVolume,  exec, $audio set-volume @DEFAULT_AUDIO_SINK@ 5%-
bindl = SUPER, XF86AudioRaiseVolume,  exec, $player volume 0.05+
bindl = SUPER, XF86AudioLowerVolume,  exec, $player volume 0.05-
bindl = SUPER, XF86MonBrightnessUp,   exec, $display setvcp 10 85
bindl =,       XF86MonBrightnessUp,   exec, $display setvcp 10 + 5
bindl =,       XF86MonBrightnessDown, exec, $display setvcp 10 - 5
bindl = SUPER, XF86MonBrightnessDown, exec, $display setvcp 10 15
bind  =,       XF86Calculator,        exec, $terminal calc
bind  =,       XF86Explorer,          exec, $terminal zsh -c 'cd "$(xplr --print-pwd-as-result)" 2>/dev/null; exec zsh -l'

# ╭───────────────────────────────────────────────────────────────────────────────╮
# │ screenshare                                                                   │
# ╰───────────────────────────────────────────────────────────────────────────────╯
bindd = SUPER SHIFT, S, Screenshot to clipboard, exec, hyprd screenshot
bindd = SUPER SHIFT, B, Screenshot + annotate,   exec, hyprd screenshot annotate
bindd = SUPER SHIFT, P, Screen share mode,       exec, hyprd share

# ╭───────────────────────────────────────────────────────────────────────────────╮
# │ lock                                                                          │
# ╰───────────────────────────────────────────────────────────────────────────────╯
bindd = SUPER,       L, Lock screen,   exec, hyprd lock full
bindd = SUPER SHIFT, L, Wake displays, exec, sh -c 'hyprctl dispatch dpms off; sleep 1; hyprctl dispatch dpms on'

bindd = SUPER SHIFT, Q, pseudo-lock, exec, hyprd lock
submap = pseudolock
bind   = SUPER SHIFT, Q, exec, hyprd lock unlock && $player play
bind   =   , catchall, exec,
submap = reset
